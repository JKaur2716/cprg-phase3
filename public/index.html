<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Revisal – Project Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
</head>
 
<body>
<div class="app">
 
 
  <!-- Sidebar -->
<aside class="sidebar">
    <div class="sidebar-logo">
      <img src="Images/revisal-logo.png" alt="Revisal logo" />
    </div>
 
    <nav>
      <a class="nav-link" href="#">Home</a>
      <a class="nav-link active" href="#">Project</a>
      <a class="nav-link" href="#">Calendar</a>
      <a class="nav-link" href="#">
        Communicate
        <span class="badge">3</span>
        <span class="chevron">&#9662;</span>
      </a>
      <a class="nav-link" href="#">Services</a>
      <a class="nav-link" href="#">Notifications</a>
      <a class="nav-link" href="#">Settings</a>
    </nav>
 
    <div class="sidebar-footer">
      <a class="nav-link" href="#">Help</a>
      <a class="nav-link" href="/logout" style="color: #ff4d4d; margin-top: 10px; display: block;">Logout</a>
    </div>
  </aside>
 
  <!-- Main -->
<div class="main">
 
    <!-- Top bar -->
<div class="topbar">
<div class="greeting">
<h1>Hello, Humann!!!!</h1>
<p>I am ready to work when you are!</p>
</div>
<div class="search">
<span>&#128269;</span>
<input type="text" placeholder="Search..." />
</div>
</div>
 
    <!-- Stats -->
<div class="stats">
<div class="stat-card">
<div class="label">All project</div>
<div class="value">2</div>
</div>
<div class="stat-card">
<div class="label">Initiation</div>
<div class="value">10</div>
</div>
<div class="stat-card">
<div class="label">Planning</div>
<div class="value">4</div>
</div>
<div class="stat-card">
<div class="label">Execution</div>
<div class="value">2</div>
</div>
<div class="stat-card">
<div class="label">Monitoring</div>
<div class="value">10</div>
</div>
<div class="stat-card">
<div class="label">Closure</div>
<div class="value">4</div>
</div>
</div>
 
    <!-- Buttons -->
<div class="action-bar">
<div class="buttons">
<button class="btn">
<span class="icon">+</span>
          Add Project
</button>
<button class="btn">
<span class="icon">+</span>
          Add Task
</button>
</div>
<button class="filter-btn" title="Filter">&#8801;</button>
</div>
 
    <!-- Project table -->
<div class="table-wrap">
<h2>Project</h2>
<div class="table-scroll">
<table>
<thead>
<tr>
<th><input type="checkbox" class="cb" /></th>
<th>Project</th>
<th>Client</th>
<th>Stage</th>
<th>Progress</th>
<th>Start Date</th>
<th>End Date</th>
</tr>
</thead>
<tbody id="rows"></tbody>
</table>
</div>
</div>
 
  </div>
</div>
 
 
<script> 
 
  const projects = [
    { name: "Art Theater Projects", client: "Raegan Frenette", stage: "Initiation", progress: 12 },
    { name: "Art Theater Projects", client: "Raegan Frenette", stage: "Initiation", progress: 12 },
    { name: "Art Theater Projects", client: "Raegan Frenette", stage: "Initiation", progress: 12 },
    { name: "Art Theater Projects", client: "Raegan Frenette", stage: "Initiation", progress: 12 },
    { name: "Art Theater Projects", client: "Raegan Frenette", stage: "Initiation", progress: 12 },
    { name: "Art Theater Projects", client: "Raegan Frenette", stage: "Initiation", progress: 12 },
    { name: "Art Theater Projects", client: "Raegan Frenette", stage: "Initiation", progress: 12 },
    { name: "Art Theater Projects", client: "Raegan Frenette", stage: "Initiation", progress: 12 },
    { name: "Art Theater Projects", client: "Raegan Frenette", stage: "Initiation", progress: 12 },
    { name: "Art Theater Projects", client: "Raegan Frenette", stage: "Initiation", progress: 12 },
  ];
 
  const tbody = document.getElementById("rows");
 
  projects.forEach(p => {
    const row = document.createElement("tr");
    row.innerHTML = `
<td><input type="checkbox" class="cb" /></td>
<td>${p.name}</td>
<td>${p.client}</td>
<td><span class="stage">${p.stage}</span></td>
<td>
<div class="progress-bar">
<div class="progress-fill" style="width: ${p.progress}%"></div>
</div>
</td>
<td class="date">MM/DD/YYYY</td>
<td class="date">MM/DD/YYYY</td>
    `;
    tbody.appendChild(row);
  });


 async function loadUserProfile() {
    try {
      const response = await fetch('/profile');
      
      if (!response.ok) {
        window.location.href = '/login.html';
        return;
      }

      const data = await response.json();
      const welcomeHeader = document.querySelector('.greeting h1');
      if (welcomeHeader) {
        welcomeHeader.innerText = `Hello, ${data.user}!`;
      }

      // Show admin banner if admin
      if (data.role === 'admin') {
        const topbar = document.querySelector('.topbar');
        const adminBanner = document.createElement('div');
        adminBanner.style = "background:#6c3fc5;color:white;padding:8px 16px;border-radius:8px;margin-top:10px;";
        adminBanner.innerHTML = `⚡ Admin Access — System Status: Healthy | Active Projects: 3 | Unread Feedback: 5`;
        topbar.appendChild(adminBanner);
      }

    } catch (error) {
      console.error("Error fetching profile:", error);
    }
  }

  // Call the function as soon as the page loads
  loadUserProfile();
</script>
 
</body>
</html>
